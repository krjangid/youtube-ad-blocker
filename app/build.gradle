plugins {
    id 'com.android.application'
}

android {
    namespace 'com.blockium.tvbrowser'
    compileSdk 35

    defaultConfig {
        applicationId "com.blockium.tvbrowser"
        minSdk 21
        targetSdk 35
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    // Keeping the app ultra lightweight and native!
}
